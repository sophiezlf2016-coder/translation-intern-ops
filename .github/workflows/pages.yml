name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify team sync config
        run: |
          node -e "const fs=require('fs'); const s=fs.readFileSync('sync-config.js','utf8'); if(!/enabled:\\s*true/.test(s) && !/TEAM_SYNC_DEFAULTS/.test(fs.readFileSync('cloud-sync.js','utf8'))) { console.warn('Team sync may be disabled'); } else { console.log('Team sync config OK'); }"

      - name: Trigger GitHub Pages rebuild
        run: echo "Legacy Pages serves directly from main branch on push."
